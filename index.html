<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANM - Survey123</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#005691">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #ffffff;
            border: 8px solid #005691;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .logo {
            width: 100%;
            max-width: 300px;
            margin-bottom: 50px;
        }
        .button-container {
            margin-top: 20px;
        }
        .btn {
            background-color: #4472c4;
            color: white;
            padding: 15px 40px;
            font-size: 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:hover {
            background-color: #355a9c;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.jpg" alt="Logo ANM" class="logo">
        <div class="button-container">
            <a href="https://survey123.arcgis.com/share/73e9cc5bc5ac4f7f86fbede2122bdeeb?portalUrl=https://geo.anm.gov.br/portal" class="btn">Botão</a>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        console.log('Service Worker registrado com sucesso!');
                        // Opcional: Avisar o usuário que o app está pronto para uso offline
                        reg.onupdatefound = () => {
                            const installingWorker = reg.installing;
                            installingWorker.onstatechange = () => {
                                if (installingWorker.state === 'installed') {
                                    if (navigator.serviceWorker.controller) {
                                        console.log('Novo conteúdo disponível; por favor, atualize.');
                                    } else {
                                        console.log('Conteúdo em cache para uso offline!');
                                    }
                                }
                            };
                        };
                    })
                    .catch(err => console.log('Falha ao registrar Service Worker', err));
            });
        }
    </script>
</body>
</html>
